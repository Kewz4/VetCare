<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E8A870"/>
      <stop offset="60%" stop-color="#D4956A"/>
      <stop offset="100%" stop-color="#B5763E"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#EBB278"/>
      <stop offset="70%" stop-color="#D4956A"/>
      <stop offset="100%" stop-color="#B5763E"/>
    </radialGradient>
    <radialGradient id="earGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#C98050"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </radialGradient>
    <radialGradient id="bellyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2C990"/>
      <stop offset="100%" stop-color="#DFA76A"/>
    </radialGradient>
    <radialGradient id="muzzleGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F5D4A8"/>
      <stop offset="100%" stop-color="#DFB080"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#8B5E3C" flood-opacity="0.18"/>
    </filter>
    <filter id="noseShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3a2010" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── TAIL (behind body) ── -->
  <path d="M265 310 Q310 265 335 240 Q355 218 348 200 Q340 182 322 190 Q308 197 302 218 Q295 242 285 268 Q275 292 270 315 Z"
        fill="url(#earGrad)" filter="url(#softShadow)"/>
  <!-- tail highlight -->
  <path d="M272 305 Q308 260 328 238 Q344 220 338 206 Q333 196 323 200 Q313 203 306 222"
        fill="none" stroke="#E8A870" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- ── BODY ── -->
  <path d="M110 220 Q100 280 102 340 Q104 390 118 420 Q130 445 155 448 Q185 452 215 445 Q240 438 255 420 Q272 398 275 360 Q280 318 272 280 Q265 248 255 230 Q240 210 210 205 Q178 200 155 207 Q130 215 110 220 Z"
        fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- body shadow under belly -->
  <ellipse cx="192" cy="445" rx="75" ry="14" fill="#8B5E3C" opacity="0.18"/>

  <!-- belly lighter patch -->
  <path d="M145 270 Q145 340 150 400 Q155 430 175 440 Q195 448 215 440 Q232 432 238 405 Q245 370 242 310 Q240 270 225 255 Q210 242 190 242 Q168 242 155 258 Z"
        fill="url(#bellyGrad)" opacity="0.55"/>

  <!-- ── FRONT LEFT LEG ── -->
  <path d="M148 390 Q142 415 138 445 Q136 462 145 468 Q156 472 165 465 Q172 458 170 445 Q168 428 168 400 Z"
        fill="#C17D3F"/>
  <!-- front left paw -->
  <ellipse cx="152" cy="468" rx="16" ry="8" fill="#A86830" opacity="0.9"/>

  <!-- ── FRONT RIGHT LEG ── -->
  <path d="M218 388 Q215 413 214 443 Q213 460 222 466 Q233 470 242 463 Q249 456 246 443 Q243 426 240 398 Z"
        fill="#C17D3F"/>
  <!-- front right paw -->
  <ellipse cx="230" cy="466" rx="16" ry="8" fill="#A86830" opacity="0.9"/>

  <!-- ── BACK LEFT LEG (partially visible) ── -->
  <path d="M122 350 Q112 375 108 408 Q106 425 116 432 Q128 437 136 428 Q142 418 140 402 Q138 382 132 358 Z"
        fill="#B5763E"/>
  <ellipse cx="122" cy="432" rx="14" ry="7" fill="#8B5E3C" opacity="0.85"/>

  <!-- ── BACK RIGHT LEG ── -->
  <path d="M258 355 Q262 378 262 408 Q263 426 255 433 Q244 440 235 432 Q228 424 231 408 Q234 388 246 362 Z"
        fill="#B5763E"/>
  <ellipse cx="254" cy="433" rx="14" ry="7" fill="#8B5E3C" opacity="0.85"/>

  <!-- ── NECK ── -->
  <path d="M158 218 Q152 200 155 178 Q158 162 175 158 Q192 154 208 160 Q222 166 226 182 Q230 198 225 218 Q212 210 192 208 Q172 208 158 218 Z"
        fill="url(#bodyGrad)"/>

  <!-- ── COLLAR ── -->
  <path d="M153 188 Q155 178 175 173 Q192 169 210 173 Q226 178 228 188 Q230 196 225 200 Q210 203 192 203 Q172 203 158 200 Q150 196 153 188 Z"
        fill="#3ecfb2"/>
  <!-- collar sheen -->
  <path d="M160 182 Q178 177 200 177 Q216 177 224 182"
        fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- collar tag -->
  <circle cx="192" cy="205" r="9" fill="#2ab8b0"/>
  <circle cx="192" cy="205" r="6" fill="#1d9e97"/>
  <text x="192" y="209" text-anchor="middle" font-size="7" font-weight="800" fill="white" font-family="sans-serif">V</text>

  <!-- ── LEFT EAR (behind head) ── -->
  <path d="M142 148 Q118 138 108 120 Q98 100 110 88 Q122 76 138 88 Q150 98 155 118 Q158 134 155 148 Z"
        fill="url(#earGrad)"/>
  <!-- ear inner -->
  <path d="M143 145 Q124 136 116 120 Q108 104 118 94 Q126 85 138 95 Q148 103 152 120 Q154 133 152 145 Z"
        fill="#C17D3F" opacity="0.5"/>

  <!-- ── RIGHT EAR ── -->
  <path d="M238 148 Q262 138 274 120 Q285 100 272 88 Q259 75 244 88 Q232 98 228 118 Q225 134 228 148 Z"
        fill="url(#earGrad)"/>
  <!-- ear inner -->
  <path d="M237 145 Q256 136 265 120 Q273 104 263 94 Q255 85 243 95 Q233 103 230 120 Q228 133 230 145 Z"
        fill="#C17D3F" opacity="0.5"/>

  <!-- ── HEAD ── -->
  <circle cx="192" cy="148" r="70" fill="url(#headGrad)" filter="url(#softShadow)"/>

  <!-- head fur texture / shading -->
  <path d="M145 120 Q160 105 192 100 Q224 100 240 118 Q252 130 248 150 Q242 125 192 120 Q142 125 138 150 Q134 128 145 120 Z"
        fill="#E8A870" opacity="0.35"/>

  <!-- ── MUZZLE ── -->
  <ellipse cx="192" cy="168" rx="34" ry="26" fill="url(#muzzleGrad)"/>
  <!-- muzzle top split -->
  <path d="M192 155 L192 162" stroke="#C99060" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- ── NOSE ── -->
  <path d="M178 158 Q192 152 206 158 Q212 162 210 168 Q206 174 192 175 Q178 174 174 168 Q172 162 178 158 Z"
        fill="#3a2010" filter="url(#noseShadow)"/>
  <!-- nose highlight -->
  <ellipse cx="185" cy="161" rx="5" ry="3" fill="rgba(255,255,255,0.22)" transform="rotate(-15,185,161)"/>

  <!-- ── MOUTH ── -->
  <path d="M192 175 Q182 182 176 186 Q182 190 192 192 Q202 190 208 186 Q202 182 192 175 Z"
        fill="#C99060" opacity="0.4"/>
  <path d="M192 175 Q183 183 178 186" fill="none" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M192 175 Q201 183 206 186" fill="none" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- ── TONGUE ── -->
  <path d="M183 186 Q183 196 189 200 Q192 202 195 200 Q201 196 201 186 Q196 190 192 190 Q188 190 183 186 Z"
        fill="#e06080" opacity="0.9"/>
  <path d="M192 190 L192 200" stroke="#c04060" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- ── EYES ── -->
  <!-- left eye white -->
  <ellipse cx="170" cy="138" rx="13" ry="12" fill="white"/>
  <!-- left iris -->
  <circle cx="172" cy="139" r="9" fill="#3d2510"/>
  <!-- left pupil -->
  <circle cx="173" cy="140" r="5.5" fill="#1a0e06"/>
  <!-- left eye shine -->
  <circle cx="175" cy="137" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="170" cy="142" r="1.2" fill="white" opacity="0.4"/>
  <!-- left eyelid shadow -->
  <path d="M158 133 Q170 126 183 133" fill="none" stroke="#8B5E3C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- right eye white -->
  <ellipse cx="214" cy="138" rx="13" ry="12" fill="white"/>
  <!-- right iris -->
  <circle cx="212" cy="139" r="9" fill="#3d2510"/>
  <!-- right pupil -->
  <circle cx="211" cy="140" r="5.5" fill="#1a0e06"/>
  <!-- right eye shine -->
  <circle cx="209" cy="137" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="214" cy="142" r="1.2" fill="white" opacity="0.4"/>
  <!-- right eyelid shadow -->
  <path d="M202 133 Q214 126 226 133" fill="none" stroke="#8B5E3C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- ── EYEBROWS (expressive) ── -->
  <path d="M160 126 Q170 120 180 124" fill="none" stroke="#8B5E3C" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <path d="M205 124 Q215 120 224 126" fill="none" stroke="#8B5E3C" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- ── FOREHEAD FLUFF ── -->
  <path d="M180 88 Q192 80 204 88 Q198 82 192 80 Q186 82 180 88 Z"
        fill="#E8A870" opacity="0.5"/>

  <!-- ground shadow -->
  <ellipse cx="192" cy="480" rx="85" ry="12" fill="#8B5E3C" opacity="0.12"/>
</svg>
