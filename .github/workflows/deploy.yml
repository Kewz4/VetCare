name: VetCare SV — CI Build Check

on:
  push:
    branches: [main]
    paths:
      - 'VetCareSV/**'
  pull_request:
    branches: [main]
    paths:
      - 'VetCareSV/**'

# El deploy lo maneja Railway directamente via su integración con GitHub.
# Este workflow solo verifica que el proyecto compila antes de que Railway lo reciba.

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VetCareSV

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore
