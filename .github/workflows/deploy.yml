name: VetCare SV — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'VetCareSV/**'
      - '.github/workflows/deploy.yml'
      - 'railway.toml'

jobs:
  # ── 1. Build & verify ─────────────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VetCareSV

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

  # ── 2. Deploy to Railway ──────────────────────────────────────
  # Las tablas se crean automáticamente via EnsureCreated() al arrancar el contenedor.
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service vetcare-sv --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
