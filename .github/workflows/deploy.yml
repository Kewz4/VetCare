name: VetCare SV — Build, Migrate & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'VetCareSV/**'
      - '.github/workflows/deploy.yml'
      - 'railway.toml'

jobs:
  # ── 1. Build & test ───────────────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VetCareSV

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

  # ── 2. Run DB migrations ──────────────────────────────────────
  migrate:
    name: Run EF Migrations
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: VetCareSV
    env:
      ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore packages
        run: dotnet restore

      - name: Apply migrations
        run: dotnet ef database update --connection "${{ secrets.DATABASE_URL }}"

  # ── 3. Deploy to Railway ──────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service vetcare-sv --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
